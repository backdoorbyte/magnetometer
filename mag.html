<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MagLive UPI Data Collector</title>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 500px; width: 100%; }
    .phrase-box { background: #eef2f7; padding: 20px; border-radius: 8px; font-size: 1.3rem; font-weight: 600; color: #2c3e50; margin: 20px 0; min-height: 60px; display: flex; align-items: center; justify-content: center; border-left: 5px solid #3498db; }
    button { background: #2ecc71; color: white; border: none; padding: 12px 25px; font-size: 1rem; border-radius: 25px; cursor: pointer; transition: background 0.3s; font-weight: bold; }
    button:disabled { background: #bdc3c7; cursor: not-allowed; }
    button.recording { background: #e74c3c; }
    
    /* Recording Pulse Animation */
    .pulse-container { display: none; align-items: center; justify-content: center; margin: 15px 0; }
    .pulse-dot { width: 15px; height: 15px; background: #e74c3c; border-radius: 50%; margin-right: 10px; animation: pulse 1.2s infinite; }
    @keyframes pulse {
      0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); }
      100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
    }
    
    .timer { font-weight: bold; color: #7f8c8d; margin-top: 5px; }
    .log-status { margin-top: 15px; font-size: 0.9rem; color: #34495e; font-weight: 500; word-break: break-all; }
  </style>
</head>
<body>

  <div class="card">
    <h2>MagLive UPI Voice Collector</h2>
    <p style="color: #7f8c8d;">Please read the phrase below clearly:</p>
    
    <div class="phrase-box" id="phraseDisplay">Loading phrase...</div>
    
    <div class="pulse-container" id="animationContainer">
      <div class="pulse-dot"></div>
      <span style="color: #e74c3c; font-weight: bold;">Recording & Sensing... <span class="timer" id="timerDisplay">0s</span></span>
    </div>

    <button id="actionBtn">Start Recording</button>
    <div class="log-status" id="logStatus">Initializing sensors...</div>
  </div>

  <script>
    // UPI Dataset
    const datasets = [
      { id: "upi_mag_01", text: '“Aman ko do sau pachas rupaye transfer karo.”' },
      { id: "upi_mag_02", text: '“Mera bank account balance check karke batao.”' },
      { id: "upi_mag_03", text: '“Kirana dukaan par teen sau chalish rupaye pay kar do.”' },
      { id: "upi_mag_04", text: '“Papa ko paanch hazar rupaye bhej do aur WhatsApp par message daal dena.”' },
      { id: "upi_mag_05", text: '“Mera bijli ka bill pay karna hai, upi se ek hazar rupaye kaat lo.”' }
    ];

    let currentIdx = 0;
    let mediaRecorder;
    let audioChunks = [];
    let magnetometerData = [];
    let isRecording = false;
    let timerInterval;
    let secondsElapsed = 0;
    let magSensor = null;
    
    // REPLACE THIS with your deployed Google Apps Script Web App URL
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw08qDlwFhE9gVXhV0lH9_OpM45XyEETvYtSGto9FgZaKjk0VCDUTQ0MR8GGPsEuxKsfQ/exec"; 

    const phraseDisplay = document.getElementById('phraseDisplay');
    const actionBtn = document.getElementById('actionBtn');
    const animationContainer = document.getElementById('animationContainer');
    const timerDisplay = document.getElementById('timerDisplay');
    const logStatus = document.getElementById('logStatus');

    phraseDisplay.innerText = datasets[currentIdx].text;

    // Setup Magnetometer (MagLive targets 100Hz sampling rate)
    if ('Magnetometer' in window) {
      try {
        magSensor = new Magnetometer({ frequency: 100 });
        magSensor.addEventListener('reading', () => {
          if (isRecording) {
            magnetometerData.push({
              x: magSensor.x,
              y: magSensor.y,
              z: magSensor.z,
              t: Date.now() // Absolute epoch timestamp for time alignment
            });
          }
        });
        magSensor.addEventListener('error', event => {
          log(`Sensor Error: ${event.error.message}`, "error");
        });
        magSensor.start();
        log("System Ready. Audio + 100Hz Magnetometer active.", "info");
      } catch (err) {
        log("Sensor initialization failed. Check permissions.", "error");
      }
    } else {
      log("Magnetometer API not supported on this device/browser.", "error");
    }

    actionBtn.onclick = async () => {
      if (!isRecording) {
        await startRecording();
      } else {
        stopRecording();
      }
    };

    async function startRecording() {
      audioChunks = [];
      magnetometerData = []; // Clear previous stream matrix
      
      try {
        log("Opening microphone...", "info");
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
        mediaRecorder.onstop = processAndUploadAudio;

        isRecording = true;
        mediaRecorder.start();
        
        actionBtn.innerText = "Stop Recording";
        actionBtn.classList.add('recording');
        animationContainer.style.display = 'flex';
        log("Recording active. Speak phrase now!", "success");

        secondsElapsed = 0;
        timerDisplay.innerText = "0s";
        timerInterval = setInterval(() => {
          secondsElapsed++;
          timerDisplay.innerText = secondsElapsed + "s";
          
          if (secondsElapsed >= 10) {
            log("Reached maximum 10-second limit. Stopping.", "info");
            stopRecording();
          }
        }, 1000);

      } catch (err) {
        log(`Microphone Error: ${err.message}`, "error");
      }
    }

    function stopRecording() {
      if (mediaRecorder && isRecording) {
        clearInterval(timerInterval);
        isRecording = false;
        mediaRecorder.stop();
        mediaRecorder.stream.getTracks().forEach(track => track.stop()); // kill mic stream
        
        actionBtn.innerText = "Processing...";
        actionBtn.disabled = true;
        actionBtn.classList.remove('recording');
        animationContainer.style.display = 'none';
      }
    }

    async function processAndUploadAudio() {
      // MagLive Data validation checkpoint
      if (secondsElapsed < 3) {
        log(`Sample discarded. Length (${secondsElapsed}s) must be 3-10s.`, "error");
        resetUI();
        return;
      }

      log(`Encoding data... Captured ${magnetometerData.length} sensor vectors.`, "info");
      
      const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
      const reader = new FileReader();
      
      reader.onloadend = async () => {
        try {
          const base64Audio = reader.result.split(',')[1];
          log("Uploading payload to Google Drive folders...", "info");
          
          const payload = {
            audioData: base64Audio,
            sensorData: JSON.stringify(magnetometerData), 
            phraseId: datasets[currentIdx].id
          };

          const response = await fetch(WEB_APP_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
          });

          const result = await response.json();
          
          if (result.status === 'success') {
            log(`Success! Saved as ${result.baseName}`, "success");
            goToNextPhrase();
          } else {
            log(`Server Error: ${result.message}`, "error");
          }
        } catch (err) {
          log(`Upload Failed: ${err.message}`, "error");
        } finally {
          resetUI();
        }
      };
      
      reader.readAsDataURL(audioBlob);
    }

    function goToNextPhrase() {
      currentIdx++;
      if (currentIdx < datasets.length) {
        phraseDisplay.innerText = datasets[currentIdx].text;
      } else {
        phraseDisplay.innerText = "🎉 Collection complete! All MagLive vectors stored.";
        actionBtn.style.display = 'none';
      }
    }

    function resetUI() {
      actionBtn.disabled = false;
      actionBtn.innerText = "Start Recording";
    }

    function log(message, type) {
      console.log(`[${type.toUpperCase()}] ${message}`);
      logStatus.innerText = message;
      if (type === "error") logStatus.style.color = "#e74c3c";
      if (type === "success") logStatus.style.color = "#2ecc71";
      if (type === "info") logStatus.style.color = "#34495e";
    }
  </script>
</body>
</html>
